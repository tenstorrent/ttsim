# Builds the simulator on x86_64 and aarch64 to verify the public source remains buildable on every change.
name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-22.04-arm, ubuntu-24.04, ubuntu-24.04-arm]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Run Style Checker
      run: |
        scripts/check_style.py

    - name: Build Simulator
      run: |
        ./make.py :build

    - name: Hash Build Outputs
      run: |
        sha256sum src/_out/{debug,release}_{wh,bh}/libttsim.so
